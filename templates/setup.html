<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Abound Next-Gen E-Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            {% if logo_url %}<img src="{{ logo_url }}" alt="Abound Next-Gen E-Hub" class="login-logo">{% endif %}
            <h1>Abound Next-Gen E-Hub</h1>
            <span class="company-subtitle" style="text-align:center;display:block;margin-bottom:0.5rem;">An Abound Entertainment Venture</span>
            <h2>Initial Setup — Create Admin Account</h2>

            <form method="POST" action="{{ url_for('setup') }}" class="login-form">
                <div class="form-group form-float">
                    <input type="text" id="full_name" name="full_name" required placeholder=" ">
                    <label for="full_name">Full Name</label>
                </div>
                
                <div class="form-group form-float">
                    <input type="text" id="username" name="username" required placeholder=" ">
                    <label for="username">Username</label>
                </div>
                
                <div class="form-group form-float">
                    <input type="email" id="email" name="email" required placeholder=" ">
                    <label for="email">Email</label>
                </div>
                
                <div class="form-group form-float">
                    <input type="password" id="password" name="password" required placeholder=" ">
                    <label for="password">Password</label>
                </div>
                
                <button type="submit" class="btn btn-primary">Create Admin Account</button>
            </form>
        </div>
    </div>
</body>
</html>
