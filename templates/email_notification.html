<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.7; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 24px; color: #ea580c; }
        .content { background: #f9fafb; padding: 24px; border-radius: 8px; border: 1px solid #e5e7eb; }
        .message { margin: 16px 0; white-space: pre-wrap; }
        .link-box { background: #fff; padding: 16px; border-radius: 8px; margin: 20px 0; border: 1px solid #e5e7eb; }
        .footer { margin-top: 28px; font-size: 0.9em; color: #666; }
        a { color: #ea580c; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Abound NextGen E Hub</h1>
    </div>
    
    <div class="content">
        <p>Hello,</p>
        <p class="message">{{ message }}</p>
        {% if click_action %}
        <div class="link-box">
            <p><strong>Visit:</strong><br><a href="{{ app_url }}{{ click_action }}">{{ app_url }}{{ click_action }}</a></p>
        </div>
        {% endif %}
        <p>Regards,<br><strong>Abound NextGen E Hub</strong></p>
    </div>
    
    <div class="footer">
        <p>Support:<br>aboundehub@gmail.com<br>+91 90073 76556</p>
    </div>
</body>
</html>
