<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>body{font-family:Arial,sans-serif;line-height:1.6;color:#333;max-width:600px;margin:0 auto;padding:20px;}</style></head>
<body>
    <p>Dear {{ user.full_name }},</p>
    <p>Your Abound Next-Gen E-Hub account has been created. Here are your login credentials:</p>
    <p><strong>Username:</strong> {{ user.username }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Password:</strong> {{ password }}</p>
    <p>Please log in at <a href="{{ app_url }}/login">{{ app_url }}/login</a> and change your password after first login.</p>
</body>
</html>
