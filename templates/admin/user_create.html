{% extends "base.html" %}
{% block title %}Create User - Admin{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('admin_dashboard') }}">Dashboard</a> > User Management > Create User{% endblock %}
{% block content %}
<div class="admin-page">
    <h1>Create User</h1>
    <p><a href="{{ url_for('admin_users') }}" class="btn btn-secondary btn-sm">← Back to Users</a></p>
    <form method="POST" class="login-form" style="max-width: 500px;">
        <div class="form-group">
            <label>Role *</label>
            <select name="role" id="roleSelect">
                <option value="user">Sales User</option>
                {% if current_user.is_super_admin %}
                <option value="admin">Admin</option>
                {% endif %}
            </select>
        </div>
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="full_name" required>
        </div>
        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Username *</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone">
        </div>
        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address">
        </div>
        <div id="salesFields">
            <div class="form-group">
                <label>Sales Level (1-10)</label>
                <select name="user_level">
                    {% for lvl, name in config.LEVELS %}
                    <option value="{{ lvl }}" {% if lvl == 1 %}selected{% endif %}>{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Referrer (optional)</label>
                <select name="parent_id">
                    <option value="">— Root —</option>
                    {% for u in sales_users %}
                    <option value="{{ u.id }}">{{ u.full_name }} ({{ u.referral_id }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Referral ID (auto if empty)</label>
                <input type="text" name="referral_id" placeholder="Leave empty to auto-generate">
            </div>
        </div>
        <div class="form-group">
            <label>Password *</label>
            <div>
                <label><input type="radio" name="password_option" value="manual" checked> Manual</label>
                <label><input type="radio" name="password_option" value="auto"> Auto-generate (email to user)</label>
            </div>
        </div>
        <div class="form-group" id="passwordField">
            <label>Password *</label>
            <input type="password" name="password" id="pwInput">
        </div>
        <button type="submit" class="btn btn-primary">Create User</button>
    </form>
</div>
<script>
document.getElementById('roleSelect').onchange = function() {
    document.getElementById('salesFields').style.display = this.value === 'user' ? 'block' : 'none';
};
document.querySelectorAll('input[name="password_option"]').forEach(function(r) {
    r.onchange = function() {
        document.getElementById('passwordField').style.display = this.value === 'manual' ? 'block' : 'none';
        document.getElementById('pwInput').required = this.value === 'manual';
    };
});
</script>
{% endblock %}
