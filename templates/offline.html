<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff7a00">
    <title>Offline - Abound-E-Hub</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f5f6f8; padding: 1rem; }
        .offline-box { text-align: center; max-width: 400px; }
        .offline-logo { max-width: 120px; height: auto; margin-bottom: 1.5rem; }
        h1 { font-size: 1.5rem; color: #333; margin: 0 0 0.75rem 0; }
        p { color: #666; line-height: 1.6; margin: 0 0 1.5rem 0; }
        .btn-retry { display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, #ff7a00, #e65100); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none; }
        .btn-retry:hover { opacity: 0.95; }
    </style>
</head>
<body>
    <div class="offline-box">
        {% if logo_url %}<img src="{{ logo_url }}" alt="Logo" class="offline-logo">{% else %}<div class="offline-logo" style="font-size:4rem; color:#ff7a00;">📦</div>{% endif %}
        <h1>You are currently offline</h1>
        <p>Please check your internet connection and try again.</p>
        <button type="button" class="btn-retry" id="retry-btn">Retry</button>
    </div>
    <script>
        document.getElementById('retry-btn').addEventListener('click', function() {
            window.location.reload();
        });
    </script>
</body>
</html>
